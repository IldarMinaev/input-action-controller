name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --requirement requirements-ci.txt
      - run: ruff check .
      - run: ruff format --check .

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: sudo apt-get install --yes libarchive-tools
      - run: python -m pip install .
      - run: PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests -v
      - run: python -m compileall -q src tests

  distribution:
    name: Python distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --requirement requirements-ci.txt
      - run: python -m build
      - name: Verify wheel contents
        run: |
          wheel=$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)
          test -n "$wheel"
          python scripts/verify-artifacts --wheel "$wheel"

  arch-package:
    name: Arch package
    runs-on: ubuntu-latest
    container: archlinux:base-devel@sha256:412efebb0eeef0ef322ff24ad73f82b1ba2d3b12377db4c5fbe3074c7e7e8678
    timeout-minutes: 30
    steps:
      - run: pacman -Syu --noconfirm git
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Arch dependencies
        run: >-
          pacman -S --noconfirm
          python python-pyudev python-evdev python-tomlkit systemd sudo acl coreutils
          python-build python-installer python-setuptools python-wheel shellcheck actionlint
      - run: shellcheck scripts/makepkg
      - run: actionlint
      - name: Build as an unprivileged user
        run: |
          useradd --create-home builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser --user builder -- ./scripts/makepkg
