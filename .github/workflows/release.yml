name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: Release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    uses: ./.github/workflows/ci.yml

  validate:
    name: Validate version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Match tag and package versions
        shell: bash
        run: |
          set -euo pipefail
          tag_version=${GITHUB_REF_NAME#v}
          project_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          pkgbuild_version=$(sed -n 's/^pkgver=//p' PKGBUILD)
          makepkg_version=$(sed -n 's/^pkgver=//p' scripts/makepkg)
          test "$GITHUB_REF_NAME" = "v$tag_version"
          test "$tag_version" = "$project_version"
          test "$tag_version" = "$pkgbuild_version"
          test "$tag_version" = "$makepkg_version"

  python-distribution:
    name: Build Python distribution
    needs: [verify, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - run: python -m pip install --requirement requirements-ci.txt
      - run: python -m build
      - name: Verify wheel contents
        run: |
          wheel=$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)
          test -n "$wheel"
          python scripts/verify-artifacts --wheel "$wheel"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distribution
          path: dist/*
          if-no-files-found: error

  arch-package:
    name: Build Arch package
    needs: [verify, validate]
    runs-on: ubuntu-latest
    container: archlinux:base-devel@sha256:412efebb0eeef0ef322ff24ad73f82b1ba2d3b12377db4c5fbe3074c7e7e8678
    timeout-minutes: 30
    steps:
      - run: pacman -Syu --noconfirm git
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Arch dependencies
        run: >-
          pacman -S --noconfirm
          python python-pyudev python-evdev python-tomlkit systemd sudo acl coreutils
          python-build python-installer python-setuptools python-wheel
      - name: Build as an unprivileged user
        run: |
          useradd --create-home builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser --user builder -- ./scripts/makepkg
          cp .makepkg/sources/input-action-controller-*.tar.gz .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arch-package
          path: |
            input-action-controller-*.pkg.tar.zst
            input-action-controller-*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [python-distribution, arch-package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0)
          test "${#assets[@]}" -gt 0
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            "${assets[@]}"
